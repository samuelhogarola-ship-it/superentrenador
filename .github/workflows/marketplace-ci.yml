name: Marketplace CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  marketplace:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
        working-directory: apps/marketplace

      - name: Build marketplace
        run: npm run build:marketplace

      - name: Run marketplace smoke test
        run: npm run test:e2e:marketplace

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-playwright-report
          path: apps/marketplace/playwright-report/
          retention-days: 7
