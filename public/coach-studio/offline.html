<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a1214" />
    <title>Sin conexión | Superentrenador</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Barlow, system-ui, sans-serif;
        background:
          radial-gradient(circle at top left, rgba(230, 183, 79, 0.18), transparent 30%),
          linear-gradient(180deg, #0a1214 0%, #0d171a 100%);
        color: #edf6f3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 560px);
        border: 1px solid rgba(188, 225, 214, 0.14);
        border-radius: 28px;
        background: rgba(19, 36, 40, 0.92);
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.22);
        padding: 32px;
      }

      h1 {
        margin: 0 0 12px;
        font-family: 'Bebas Neue', Impact, sans-serif;
        font-size: clamp(2.8rem, 10vw, 4rem);
        letter-spacing: 0.04em;
      }

      p {
        margin: 0 0 16px;
        color: #cfe0db;
        line-height: 1.6;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 20px;
        border-radius: 999px;
        background: #e6b74f;
        color: #111;
        font-weight: 700;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Sin conexión</h1>
      <p>La app sigue disponible, pero esta vista todavía no se ha guardado para usarla offline.</p>
      <p>Vuelve a intentarlo cuando tengas red o abre una pantalla que ya hayas visitado antes.</p>
      <a href="/coach-studio/clientes">Ir al panel</a>
    </main>
  </body>
</html>
